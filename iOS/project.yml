name: Roastlog
options:
  bundleIdPrefix: com.shimondeitel.roastlogx
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Roastlog:
    type: application
    platform: iOS
    sources:
      - path: Roastlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roastlogx
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Roastlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RoastlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoastlogTests
      - path: Roastlog.storekit
    dependencies:
      - target: Roastlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roastlogx.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RoastlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoastlogUITests
    dependencies:
      - target: Roastlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roastlogx.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Roastlog:
    build:
      targets:
        Roastlog: all
        RoastlogTests: [test]
        RoastlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Roastlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Roastlog.storekit
      targets:
        - RoastlogTests
        - RoastlogUITests
    archive:
      config: Release
